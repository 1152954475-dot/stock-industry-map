<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股产业链全景图</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 800px;
  width: 100%;
}
h1 {
  text-align: center;
  color: #fff;
  font-size: 48px;
  margin-bottom: 20px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}
.subtitle {
  text-align: center;
  color: rgba(255,255,255,0.9);
  font-size: 18px;
  margin-bottom: 50px;
}
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 30px;
}
.card {
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  padding: 40px;
  text-align: center;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  transition: transform 0.3s, box-shadow 0.3s;
  cursor: pointer;
  text-decoration: none;
  display: block;
}
.card:hover {
  transform: translateY(-10px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.icon {
  font-size: 64px;
  margin-bottom: 20px;
}
.card h2 {
  font-size: 28px;
  color: #333;
  margin-bottom: 10px;
}
.card p {
  color: #666;
  font-size: 16px;
  line-height: 1.6;
}
.tech { background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1)); }
.battery { background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(59, 130, 246, 0.1)); }
</style>
</head>
<body>
<div class="container">
  <h1>🎯 A股产业链全景图</h1>
  <p class="subtitle">深入浅出，图文并茂，一站式了解科技与新能源核心板块</p>

  <div class="cards">
    <a href="tech_stocks_map.html" class="card tech">
      <div class="icon">💻</div>
      <h2>科技板块全景</h2>
      <p>PCB、CPU、MLCC等11个细分领域，产业链金字塔与A股龙头一览</p>
    </a>

    <a href="battery_stocks_map.html" class="card battery">
      <div class="icon">🔋</div>
      <h2>电池板块全景</h2>
      <p>锂电池产业链四层结构，正负极材料、储能、钠电、固态电池全覆盖</p>
    </a>
  </div>
</div>
</body>
</html>
